name: "✨ Ask for a feature"
description: Suggest a new capability or improvement (not a new model — use the model template for that).
title: "[Feature] <short description>"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For **new models**, please use the "Submit a new model" template instead.
        Use this for framework features (new task modes, metrics, tooling, datasets, etc.).
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that's currently hard or impossible? Why does it matter?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should ModernTSF do? Sketch the API/config/CLI if you can.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried or other designs you weighed.
    validations:
      required: false
  - type: textarea
    id: scope
    attributes:
      label: Scope & impact
      description: Which parts of the pipeline (config, registry, runner, data, models) would this touch? Backward-compatible?
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for a similar request.
          required: true
        - label: I am willing to help implement this (optional).
          required: false
