name: "🐛 Report a bug"
description: Report something that is broken or behaves incorrectly.
title: "[Bug] <short description>"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please give us enough to **reproduce** the problem. Issues without a
        config, command, and traceback are hard to act on and may be closed.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What went wrong, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro-config
    attributes:
      label: Config to reproduce
      description: Paste the TOML run config (or the smallest one that triggers it).
      render: toml
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: The exact command you ran.
      render: shell
      placeholder: uv run modern-tsf --config configs/runs/...
    validations:
      required: true
  - type: textarea
    id: traceback
    attributes:
      label: Full traceback / logs
      description: The complete error output, not just the last line.
      render: shell
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Run `bash scripts/detect_hardware.sh` and paste its output, plus your OS,
        Python, torch, and uv versions, and the `UV_TORCH_BACKEND` you installed with.
      render: shell
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Git commit / version
      description: Output of `git rev-parse --short HEAD`.
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for a duplicate.
          required: true
        - label: I reproduced this on the latest `main`.
          required: true
