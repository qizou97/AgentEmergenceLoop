name: "📦 Submit a new model"
description: Propose adding a new forecasting model to ModernTSF.
title: "[Model] <model name>"
labels: ["new-model"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a model! ModernTSF integrates models behind a common
        interface (`forward(x, *args) -> (B, pred_len, c_out)`). Please give us
        enough context to evaluate and port it. See `docs/en/add-model.md` and the
        `add-model` skill for how models are wired.
  - type: input
    id: model-name
    attributes:
      label: Model name
      placeholder: e.g. TimeXer
    validations:
      required: true
  - type: input
    id: paper
    attributes:
      label: Paper link
      description: arXiv / conference URL. Include the venue and year if known.
      placeholder: https://arxiv.org/abs/...
    validations:
      required: true
  - type: input
    id: repo
    attributes:
      label: Official / reference implementation
      description: Link to the source we should port from.
      placeholder: https://github.com/...
    validations:
      required: true
  - type: input
    id: license
    attributes:
      label: Upstream license
      description: The license of the reference implementation (MIT / Apache-2.0 / GPL / none / unknown). Required so we can vendor it legally.
      placeholder: e.g. MIT
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Transformer
        - MLP / Linear
        - CNN / TCN
        - RNN
        - Graph / Spatiotemporal
        - State-space (Mamba/S4)
        - Foundation / pretrained
        - Other
    validations:
      required: true
  - type: dropdown
    id: source-benchmark
    attributes:
      label: Where is it already benchmarked?
      multiple: true
      options:
        - Time-Series-Library (TSLib)
        - BasicTS
        - TFB
        - Author's own repo only
        - Other
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Why should we add it?
      description: What does it bring that the current 38 models don't? SOTA on which datasets/horizons?
    validations:
      required: true
  - type: textarea
    id: interface
    attributes:
      label: Interface & dependencies
      description: |
        Help us scope the port. Does it need: future/known covariates? a graph
        adjacency matrix? custom CUDA kernels (mamba_ssm / causal-conv1d)? a
        probabilistic loss head? What input layout does its `forward` expect?
    validations:
      required: true
  - type: dropdown
    id: cpu-runnable
    attributes:
      label: Does it run on CPU (no custom CUDA kernels)?
      options:
        - "Yes"
        - "No (needs CUDA kernels)"
        - Unknown
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this model is not already requested or present in `docs/en/models.md`.
          required: true
        - label: I am willing to help port and verify it (optional).
          required: false
