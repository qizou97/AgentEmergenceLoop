name: schema-check

# Guards the TSF-Core contract: fails if the committed JSON Schema under
# src/tsf_core/schema/ is out of sync with the pydantic models (i.e. someone
# changed a model but forgot to re-run `tsf schema-export`). TSEval consumes
# those *.json files, so they must always match the models.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  schema-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # tsf_core depends only on pydantic — no torch, so this stays fast.
      # Pin to the project's pydantic (uv.lock) so the rendered schema is
      # byte-identical to what was committed; bump this when the lock bumps.
      - run: pip install "pydantic==2.12.5"
      - name: Verify TSF-Core JSON Schema is up to date
        run: PYTHONPATH=src python -m tsf_core --check --out-dir src/tsf_core/schema
