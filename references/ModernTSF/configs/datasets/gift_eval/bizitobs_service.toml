# GIFT-EVAL dataset: bizitobs_service
# pred_len follows GIFT-EVAL "short" term (1x).
# Other terms:  medium = 600 (10x),  long = 900 (15x)

[dataset]
name = "gift_eval"
alias = "gift_eval/bizitobs_service"
root_path = "./dataset/gift_eval"
data_path = "bizitobs_service"

[dataset.params]
scale = true

[task]
pred_len = 60
features = "M"
