# GIFT-EVAL dataset: temperature_rain_with_missing
# pred_len follows GIFT-EVAL "short" term (1x).
# Other terms:  medium = 300 (10x),  long = 450 (15x)

[dataset]
name = "gift_eval"
alias = "gift_eval/temperature_rain_with_missing"
root_path = "./dataset/gift_eval"
data_path = "temperature_rain_with_missing"

[dataset.params]
scale = true

[task]
pred_len = 30
features = "M"
