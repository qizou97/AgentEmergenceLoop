# GIFT-EVAL dataset: m4_yearly
# pred_len follows GIFT-EVAL "short" term (1x).
# Other terms:  medium = 60 (10x),  long = 90 (15x)

[dataset]
name = "gift_eval"
alias = "gift_eval/m4_yearly"
root_path = "./dataset/gift_eval"
data_path = "m4_yearly"

[dataset.params]
scale = true

[task]
pred_len = 6
features = "M"
