# GIFT-EVAL dataset: jena_weather
# pred_len follows GIFT-EVAL "short" term (1x).
# Other terms:  medium = 480 (10x),  long = 720 (15x)

[dataset]
name = "gift_eval"
alias = "gift_eval/jena_weather"
root_path = "./dataset/gift_eval"
data_path = "jena_weather"

[dataset.params]
scale = true

[task]
pred_len = 48
features = "M"
