# GIFT-EVAL dataset: SZ_TAXI/H
# pred_len follows GIFT-EVAL "short" term (1x).
# Other terms:  medium = 480 (10x),  long = 720 (15x)

[dataset]
name = "gift_eval"
alias = "gift_eval/SZ_TAXI_H"
root_path = "./dataset/gift_eval"
data_path = "SZ_TAXI/H"

[dataset.params]
scale = true

[task]
pred_len = 48
features = "M"
