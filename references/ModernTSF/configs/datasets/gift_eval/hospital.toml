# GIFT-EVAL dataset: hospital
# pred_len follows GIFT-EVAL "short" term (1x).
# Other terms:  medium = 120 (10x),  long = 180 (15x)

[dataset]
name = "gift_eval"
alias = "gift_eval/hospital"
root_path = "./dataset/gift_eval"
data_path = "hospital"

[dataset.params]
scale = true

[task]
pred_len = 12
features = "M"
