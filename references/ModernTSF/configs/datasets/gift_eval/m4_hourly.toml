# GIFT-EVAL dataset: m4_hourly
# pred_len follows GIFT-EVAL "short" term (1x).
# Other terms:  medium = 480 (10x),  long = 720 (15x)

[dataset]
name = "gift_eval"
alias = "gift_eval/m4_hourly"
root_path = "./dataset/gift_eval"
data_path = "m4_hourly"

[dataset.params]
scale = true

[task]
pred_len = 48
features = "M"
