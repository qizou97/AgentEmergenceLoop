# GIFT-EVAL dataset: covid_deaths
# pred_len follows GIFT-EVAL "short" term (1x).
# Other terms:  medium = 300 (10x),  long = 450 (15x)

[dataset]
name = "gift_eval"
alias = "gift_eval/covid_deaths"
root_path = "./dataset/gift_eval"
data_path = "covid_deaths"

[dataset.params]
scale = true

[task]
pred_len = 30
features = "M"
