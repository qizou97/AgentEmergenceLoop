# GIFT-EVAL dataset: ett2/W
# pred_len follows GIFT-EVAL "short" term (1x).
# Other terms:  medium = 80 (10x),  long = 120 (15x)

[dataset]
name = "gift_eval"
alias = "gift_eval/ett2_W"
root_path = "./dataset/gift_eval"
data_path = "ett2/W"

[dataset.params]
scale = true

[task]
pred_len = 8
features = "M"
