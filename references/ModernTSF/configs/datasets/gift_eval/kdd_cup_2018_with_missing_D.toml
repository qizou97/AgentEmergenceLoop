# GIFT-EVAL dataset: kdd_cup_2018_with_missing/D
# pred_len follows GIFT-EVAL "short" term (1x).
# Other terms:  medium = 300 (10x),  long = 450 (15x)

[dataset]
name = "gift_eval"
alias = "gift_eval/kdd_cup_2018_with_missing_D"
root_path = "./dataset/gift_eval"
data_path = "kdd_cup_2018_with_missing/D"

[dataset.params]
scale = true

[task]
pred_len = 30
features = "M"
