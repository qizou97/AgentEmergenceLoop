# GIFT-EVAL dataset: m4_weekly
# pred_len follows GIFT-EVAL "short" term (1x).
# Other terms:  medium = 130 (10x),  long = 195 (15x)

[dataset]
name = "gift_eval"
alias = "gift_eval/m4_weekly"
root_path = "./dataset/gift_eval"
data_path = "m4_weekly"

[dataset.params]
scale = true

[task]
pred_len = 13
features = "M"
