# GIFT-EVAL dataset: car_parts_with_missing
# pred_len follows GIFT-EVAL "short" term (1x).
# Other terms:  medium = 120 (10x),  long = 180 (15x)

[dataset]
name = "gift_eval"
alias = "gift_eval/car_parts_with_missing"
root_path = "./dataset/gift_eval"
data_path = "car_parts_with_missing"

[dataset.params]
scale = true

[task]
pred_len = 12
features = "M"
