# GIFT-EVAL dataset: LOOP_SEATTLE/5T
# pred_len follows GIFT-EVAL "short" term (1x).
# Other terms:  medium = 480 (10x),  long = 720 (15x)

[dataset]
name = "gift_eval"
alias = "gift_eval/LOOP_SEATTLE_5T"
root_path = "./dataset/gift_eval"
data_path = "LOOP_SEATTLE/5T"

[dataset.params]
scale = true

[task]
pred_len = 48
features = "M"
