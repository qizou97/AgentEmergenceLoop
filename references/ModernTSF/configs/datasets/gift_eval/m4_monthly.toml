# GIFT-EVAL dataset: m4_monthly
# pred_len follows GIFT-EVAL "short" term (1x).
# Other terms:  medium = 180 (10x),  long = 270 (15x)

[dataset]
name = "gift_eval"
alias = "gift_eval/m4_monthly"
root_path = "./dataset/gift_eval"
data_path = "m4_monthly"

[dataset.params]
scale = true

[task]
pred_len = 18
features = "M"
