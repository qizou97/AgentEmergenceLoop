# Stock CSI-300 (沪深300) — the first TSEval RealTime dataset.
#
# Same flat-channel forecasting loader as cauair_ts (each constituent's series
# is a channel); what makes this a distinct, correctly-labelled benchmark is:
#   alias = "stock_hs300"  -> records / run_ids / leaderboard use this id
#   track = "realtime"     -> filed under the RealTime leaderboard track
#
# Data: Diaugeia/TSEval-RealTime (stock_hs300/). Place the prepared panel under
# `root_path` before running (see that dataset's README). Reference protocol:
# seq_len 20 trading days -> pred_len 5.
[dataset]
name = "cauair_ts"
alias = "stock_hs300"
track = "realtime"
root_path = "./dataset/stock_hs300"
data_path = ""

[dataset.params]
input_dim = 8
npz_name = "his.npz"
scale = true
