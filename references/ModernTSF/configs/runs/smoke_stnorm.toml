# Spatiotemporal smoke run: STNorm on the cauair_st bundle (adj_mx + calendar
# covariates), CPU, 1 epoch. STNorm is graph-free; adj_mx is injected but
# ignored.
extends = ["../base.toml", "../datasets/cauair_ccaq_st.toml", "../models/STNorm.toml"]

[experiment]
description = "Smoke: spatiotemporal / STNorm"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
mode = "spatiotemporal"
seq_len = 24
label_len = 0
pred_len = 24
features = "M"

[training]
epochs = 1
batch_size = 8
loss = "mae"
patience = 1

[dataset]
name = "cauair_st"
root_path = "dataset/cauair_ccaq"
data_path = ""

[dataset.params]
input_dim = 3
npz_name = "his.npz"
scale = false
max_windows = 32

[model.params]
enc_in = 8
input_dim = 3
channels = 16
kernel_size = 2
blocks = 2
layers = 2
