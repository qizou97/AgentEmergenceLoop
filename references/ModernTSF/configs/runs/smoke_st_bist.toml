# Spatiotemporal mode smoke run: BiST on synthetic node data (CPU, 1 epoch).
extends = ["../base.toml", "../datasets/synthetic_st.toml", "../models/BiST.toml"]

[experiment]
description = "Smoke: spatiotemporal / BiST"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
mode = "spatiotemporal"
seq_len = 24
label_len = 0
pred_len = 12
features = "M"

[training]
epochs = 1
batch_size = 16
loss = "mae"
patience = 1

[model.params]
enc_in = 8
model_dim = 16
prompt_dim = 16
tod_size = 24
