# Scaffolded smoke run for FEDformer on the tiny built-in smoke dataset (CPU, 1 epoch).
extends = ["../base.toml", "../datasets/smoke.toml", "../models/FEDformer.toml"]

[experiment]
description = "Smoke: FEDformer"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
seq_len = 96
label_len = 0
pred_len = 12
features = "M"

[training]
epochs = 1
batch_size = 16
loss = "mae"
patience = 1

[model.params]
enc_in = 6
dec_in = 6
c_out = 6
d_model = 32
n_heads = 4
e_layers = 1
d_layers = 1
d_ff = 64
modes = 8
