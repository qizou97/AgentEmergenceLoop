# Tiny end-to-end smoke run: TimeXer on synthetic data (CPU, 1 epoch).
extends = ["../base.toml", "../datasets/smoke.toml", "../models/TimeXer.toml"]

[experiment]
description = "Smoke: TimeXer"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
seq_len = 24
label_len = 0
pred_len = 12
features = "M"

[training]
epochs = 1
batch_size = 16
loss = "mae"
patience = 1

[model.params]
enc_in = 6
d_model = 32
n_heads = 4
e_layers = 1
d_ff = 64
patch_len = 12
