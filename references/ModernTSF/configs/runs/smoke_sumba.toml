# Tiny end-to-end smoke run: Sumba on synthetic data (CPU, 1 epoch).
extends = ["../base.toml", "../datasets/smoke.toml", "../models/Sumba.toml"]

[experiment]
description = "Smoke: Sumba"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
seq_len = 96
label_len = 0
pred_len = 12
features = "M"

[training]
epochs = 1
batch_size = 16
loss = "mae"
patience = 1

[model.params]
enc_in = 6
residual_channels = 8
conv_channels = 8
skip_channels = 16
end_channels = 32
dimension = 8
M = 4
LowRank = 6
D = 8
