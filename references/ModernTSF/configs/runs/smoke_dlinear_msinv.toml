# Regression smoke: MS (multivariate-input, single-target) forecasting with
# inverse=true. Guards the dataset inverse-transform against the channel-count
# mismatch bug (the scaler is fit on all C channels but MS emits 1 target
# column). Runs under `tsf smoke --all` / `--config`. CPU, 1 epoch.
extends = ["../base.toml", "../datasets/smoke.toml", "../models/DLinear.toml"]

[experiment]
description = "Smoke: DLinear (MS + inverse-transform)"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
seq_len = 96
label_len = 0
pred_len = 12
features = "MS"
inverse = true

[training]
epochs = 1
batch_size = 16
loss = "mae"
patience = 1

[model.params]
enc_in = 6
