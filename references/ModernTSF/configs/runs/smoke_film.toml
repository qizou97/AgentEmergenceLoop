# Tiny end-to-end smoke run: FiLM on synthetic data (CPU, 1 epoch).
extends = ["../base.toml", "../datasets/smoke.toml", "../models/FiLM.toml"]

[experiment]
description = "Smoke: FiLM"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
seq_len = 96
label_len = 0
pred_len = 12
features = "M"

[training]
epochs = 1
batch_size = 16
loss = "mae"
patience = 1

[model.params]
enc_in = 6
multiscale = [1, 2, 4]
window_size = [64]
