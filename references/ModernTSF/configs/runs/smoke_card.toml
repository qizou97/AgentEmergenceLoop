# Tiny end-to-end smoke run: CARD on synthetic data (CPU, 1 epoch).
extends = ["../base.toml", "../datasets/smoke.toml", "../models/CARD.toml"]

[experiment]
description = "Smoke: CARD"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
seq_len = 96
label_len = 0
pred_len = 12
features = "M"

[training]
epochs = 1
batch_size = 16
loss = "mae"
patience = 1

[model.params]
enc_in = 6
patch_len = 16
stride = 8
d_model = 32
n_heads = 4
e_layers = 1
d_ff = 64
dp_rank = 4
merge_size = 2
