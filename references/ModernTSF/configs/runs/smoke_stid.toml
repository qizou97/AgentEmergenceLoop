# Spatiotemporal smoke run: STID graph model on the cauair_st ring-graph bundle
# (CPU, 1 epoch). The dataset provides adj_mx + calendar covariates.
extends = ["../base.toml", "../datasets/cauair_ccaq_st.toml", "../models/STID.toml"]

[experiment]
description = "Smoke: spatiotemporal / STID"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
mode = "spatiotemporal"
seq_len = 24
label_len = 0
pred_len = 24
features = "M"

[training]
epochs = 1
batch_size = 8
loss = "mae"
patience = 1

[dataset]
name = "cauair_st"
root_path = "dataset/cauair_ccaq"
data_path = ""

[dataset.params]
input_dim = 3
npz_name = "his.npz"
scale = false
max_windows = 32

[model.params]
enc_in = 8
input_dim = 3
embed_dim = 32
num_layers = 1
num_time_in_day = 24
num_day_in_week = 7
