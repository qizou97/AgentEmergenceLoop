# Smoke run for SEMPO on the tiny built-in smoke dataset (CPU, 1 epoch).
extends = ["../base.toml", "../datasets/smoke.toml", "../models/SEMPO.toml"]

[experiment]
description = "Smoke: SEMPO"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
seq_len = 96
label_len = 0
pred_len = 12
features = "M"

[training]
epochs = 1
batch_size = 16
loss = "mae"
patience = 1

[model.params]
enc_in = 6
d_model = 32
