# Tiny end-to-end smoke run: DSFormer on synthetic data (CPU, 1 epoch).
extends = ["../base.toml", "../datasets/smoke.toml", "../models/DSFormer.toml"]

[experiment]
description = "Smoke: DSFormer"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
seq_len = 96
label_len = 0
pred_len = 12
features = "M"

[training]
epochs = 1
batch_size = 16
loss = "mae"
patience = 1

[model.params]
enc_in = 6
num_layer = 1
muti_head = 2
num_samp = 2
if_node = true
