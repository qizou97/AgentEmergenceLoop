# Tiny end-to-end smoke run: CrossGNN on synthetic data (CPU, 1 epoch).
extends = ["../base.toml", "../datasets/smoke.toml", "../models/CrossGNN.toml"]

[experiment]
description = "Smoke: CrossGNN"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
seq_len = 96
label_len = 0
pred_len = 12
features = "M"

[training]
epochs = 1
batch_size = 16
loss = "mae"
patience = 1

[model.params]
enc_in = 6
e_layers = 1
scale_number = 4
tvechidden = 8
nvechidden = 8
hidden = 16
