# Spatiotemporal smoke run: D2STGNN (decoupled dynamic spatial-temporal GNN)
# on the CauAir/CCAQ node bundle, which provides adj_mx + calendar covariates
# (CPU, 1 epoch).
extends = ["../base.toml", "../datasets/cauair_ccaq_st.toml", "../models/D2STGNN.toml"]

[experiment]
description = "Smoke: spatiotemporal / D2STGNN"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
mode = "spatiotemporal"
seq_len = 24
label_len = 0
pred_len = 24
features = "M"

[training]
epochs = 1
batch_size = 8
loss = "mae"
patience = 1

[dataset]
name = "cauair_st"
root_path = "dataset/cauair_ccaq"
data_path = ""

[dataset.params]
input_dim = 3
npz_name = "his.npz"
scale = false
max_windows = 32

[model.params]
enc_in = 8
input_dim = 3
num_feat = 1
num_hidden = 16
node_hidden = 8
time_emb_dim = 8
k_s = 2
k_t = 3
gap = 1
num_layers = 2
dropout = 0.1
time_in_day_size = 288
day_in_week_size = 7
forecast_dim = 64
output_hidden = 128
