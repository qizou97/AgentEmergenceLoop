# Scaffolded smoke run for TimesNet on the tiny built-in smoke dataset (CPU, 1 epoch).
extends = ["../base.toml", "../datasets/smoke.toml", "../models/TimesNet.toml"]

[experiment]
description = "Smoke: TimesNet"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
seq_len = 96
label_len = 0
pred_len = 12
features = "M"

[training]
epochs = 1
batch_size = 16
loss = "mae"
patience = 1

# Tiny params so the smoke is fast (TimesNet is very heavy at its defaults).
[model.params]
enc_in = 6
c_out = 6
d_model = 16
e_layers = 1
d_ff = 32
top_k = 2
num_kernels = 2
