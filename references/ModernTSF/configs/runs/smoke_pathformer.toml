# Tiny end-to-end smoke run: Pathformer on synthetic data (CPU, 1 epoch).
extends = ["../base.toml", "../datasets/smoke.toml", "../models/Pathformer.toml"]

[experiment]
description = "Smoke: Pathformer"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
seq_len = 96
label_len = 0
pred_len = 12
features = "M"

[training]
epochs = 1
batch_size = 16
loss = "mae"
patience = 1

[model.params]
enc_in = 6
layer_nums = 2
k = 2
num_experts = 4
patch_size_list = [16, 12, 8, 6, 16, 12, 8, 6]
d_model = 16
d_ff = 64
