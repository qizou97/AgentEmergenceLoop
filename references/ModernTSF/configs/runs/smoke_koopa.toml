# Tiny end-to-end smoke run: Koopa on synthetic data (CPU, 1 epoch).
extends = ["../base.toml", "../datasets/smoke.toml", "../models/Koopa.toml"]

[experiment]
description = "Smoke: Koopa"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
seq_len = 96
label_len = 0
pred_len = 12
features = "M"

[training]
epochs = 1
batch_size = 16
loss = "mae"
patience = 1

[model.params]
enc_in = 6
dynamic_dim = 32
hidden_dim = 32
hidden_layers = 2
num_blocks = 2
