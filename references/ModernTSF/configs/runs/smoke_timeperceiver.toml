# Tiny end-to-end smoke run: TimePerceiver on synthetic data (CPU, 1 epoch).
extends = ["../base.toml", "../datasets/smoke.toml", "../models/TimePerceiver.toml"]

[experiment]
description = "Smoke: TimePerceiver"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
seq_len = 96
label_len = 0
pred_len = 12
features = "M"

[training]
epochs = 1
batch_size = 16
loss = "mae"
patience = 1

[model.params]
enc_in = 6
d_model = 32
n_heads = 4
d_ff = 64
patch_len = 12
num_latents = 8
latent_dim = 32
latent_d_ff = 64
num_latent_blocks = 1
