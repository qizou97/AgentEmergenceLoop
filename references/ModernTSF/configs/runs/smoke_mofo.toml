# Tiny end-to-end smoke run: MoFo on synthetic data (CPU, 1 epoch).
extends = ["../base.toml", "../datasets/smoke.toml", "../models/MoFo.toml"]

[experiment]
description = "Smoke: MoFo"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
seq_len = 24
label_len = 0
pred_len = 12
features = "M"

[training]
epochs = 1
batch_size = 16
loss = "mae"
patience = 1
