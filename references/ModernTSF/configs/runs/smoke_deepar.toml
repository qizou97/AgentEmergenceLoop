# Tiny end-to-end smoke run: DeepAR on synthetic data (CPU, 1 epoch).
extends = ["../base.toml", "../datasets/smoke.toml", "../models/DeepAR.toml"]

[experiment]
description = "Smoke: DeepAR"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
seq_len = 96
label_len = 0
pred_len = 12
features = "M"

[training]
epochs = 1
batch_size = 16
loss = "mae"
patience = 1

[model.params]
enc_in = 6
embedding_size = 16
hidden_size = 32
num_layers = 1
cov_feat_size = 0
