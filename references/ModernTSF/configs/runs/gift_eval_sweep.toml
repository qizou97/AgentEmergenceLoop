# GIFT-EVAL full sweep — "short" term (1x prediction length).
# Each dataset TOML uses the short-term pred_len.
# For medium (10x) or long (15x) terms, update pred_len in the
# individual dataset TOMLs (see comments inside each file).

extends = ["../base.toml", "../models/DLinear.toml"]

[experiment]
description = "GIFT-EVAL full sweep (short term)"

[evaluation]
enable_profile = true

[sweep.extend]
