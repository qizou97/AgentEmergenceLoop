# Tiny end-to-end smoke run: SRSNet on synthetic data (CPU, 1 epoch).
extends = ["../base.toml", "../datasets/smoke.toml", "../models/SRSNet.toml"]

[experiment]
description = "Smoke: SRSNet"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
seq_len = 96
label_len = 0
pred_len = 12
features = "M"

[training]
epochs = 1
batch_size = 16
loss = "mae"
patience = 1

[model.params]
enc_in = 6
d_model = 32
patch_len = 24
stride = 24
hidden_size = 16
