# Tiny end-to-end smoke run: MultiPatchFormer on synthetic data (CPU, 1 epoch).
extends = ["../base.toml", "../datasets/smoke.toml", "../models/MultiPatchFormer.toml"]

[experiment]
description = "Smoke: MultiPatchFormer"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
seq_len = 96
label_len = 0
pred_len = 24
features = "M"

[training]
epochs = 1
batch_size = 16
loss = "mae"
patience = 1

[model.params]
enc_in = 6
d_model = 64
n_heads = 4
e_layers = 1
d_ff = 64
