# Spatiotemporal smoke run: StemGNN on the cauair_st bundle (CPU, 1 epoch).
# The dataset provides an 8x8 ring adj_mx + node covariates; StemGNN learns its
# own latent graph and only consumes channel 0 (the value).
extends = ["../base.toml", "../models/StemGNN.toml"]

[experiment]
description = "Smoke: spatiotemporal / StemGNN"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
mode = "spatiotemporal"
seq_len = 24
label_len = 0
pred_len = 24
features = "M"

[training]
epochs = 1
batch_size = 8
loss = "mae"
patience = 1

[dataset]
name = "cauair_st"
root_path = "dataset/cauair_ccaq"
data_path = ""

[dataset.params]
input_dim = 3
npz_name = "his.npz"
scale = false
max_windows = 32

[model.params]
enc_in = 8
multi_layer = 3
