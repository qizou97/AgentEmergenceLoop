# Tiny end-to-end smoke run: MICN on synthetic data (CPU, 1 epoch).
extends = ["../base.toml", "../datasets/smoke.toml", "../models/MICN.toml"]

[experiment]
description = "Smoke: MICN"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
seq_len = 96
label_len = 0
pred_len = 12
features = "M"

[training]
epochs = 1
batch_size = 16
loss = "mae"
patience = 1

[model.params]
enc_in = 6
c_out = 6
d_model = 32
n_heads = 4
d_layers = 1
conv_kernel = [12, 16]
