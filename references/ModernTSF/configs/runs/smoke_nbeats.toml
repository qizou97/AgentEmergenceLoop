# Tiny end-to-end smoke run: NBeats on synthetic data (CPU, 1 epoch).
extends = ["../base.toml", "../datasets/smoke.toml", "../models/NBeats.toml"]

[experiment]
description = "Smoke: NBeats"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
seq_len = 96
label_len = 0
pred_len = 12
features = "M"

[training]
epochs = 1
batch_size = 16
loss = "mae"
patience = 1

[model.params]
enc_in = 6
hidden_layer_units = 64
nb_blocks_per_stack = 2
