# Tiny end-to-end smoke run: TimeKAN on synthetic data (CPU, 1 epoch).
extends = ["../base.toml", "../datasets/smoke.toml", "../models/TimeKAN.toml"]

[experiment]
description = "Smoke: TimeKAN"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
seq_len = 96
label_len = 0
pred_len = 12
features = "M"

[training]
epochs = 1
batch_size = 16
loss = "mae"
patience = 1

[model.params]
enc_in = 6
d_model = 16
e_layers = 1
down_sampling_window = 2
down_sampling_layers = 1
