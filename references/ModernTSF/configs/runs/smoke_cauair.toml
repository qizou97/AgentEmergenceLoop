# Tiny end-to-end smoke run: CauAir on synthetic data (CPU, 1 epoch).
# Air-quality models require pred_len == seq_len.
extends = ["../base.toml", "../datasets/smoke.toml", "../models/CauAir.toml"]

[experiment]
description = "Smoke: CauAir"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
seq_len = 12
label_len = 0
pred_len = 12
features = "M"

[training]
epochs = 1
batch_size = 16
loss = "mae"
patience = 1
