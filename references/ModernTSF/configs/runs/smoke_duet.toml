# Tiny end-to-end smoke run: DUET on synthetic data (CPU, 1 epoch).
extends = ["../base.toml", "../datasets/smoke.toml", "../models/DUET.toml"]

[experiment]
description = "Smoke: DUET"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
seq_len = 96
label_len = 0
pred_len = 12
features = "M"

[training]
epochs = 1
batch_size = 16
loss = "mae"
patience = 1

[model.params]
enc_in = 6
d_model = 32
n_heads = 4
e_layers = 1
d_ff = 64
moving_avg = 25
num_experts = 3
k = 2
hidden_size = 32
