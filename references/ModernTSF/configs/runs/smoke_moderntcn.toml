# Tiny end-to-end smoke run: ModernTCN on synthetic data (CPU, 1 epoch).
extends = ["../base.toml", "../datasets/smoke.toml", "../models/ModernTCN.toml"]

[experiment]
description = "Smoke: ModernTCN"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
seq_len = 96
label_len = 0
pred_len = 12
features = "M"

[training]
epochs = 1
batch_size = 16
loss = "mae"
patience = 1

[model.params]
enc_in = 6
dims = [32]
dw_dims = [32]
patch_size = 16
patch_stride = 16
