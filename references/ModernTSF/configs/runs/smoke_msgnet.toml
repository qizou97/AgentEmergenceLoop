# Tiny end-to-end smoke run: MSGNet on synthetic data (CPU, 1 epoch).
extends = ["../base.toml", "../datasets/smoke.toml", "../models/MSGNet.toml"]

[experiment]
description = "Smoke: MSGNet"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
seq_len = 96
label_len = 0
pred_len = 12
features = "M"

[training]
epochs = 1
batch_size = 16
loss = "mae"
patience = 1

[model.params]
enc_in = 6
d_model = 32
d_ff = 64
e_layers = 1
n_heads = 4
top_k = 3
conv_channel = 16
skip_channel = 16
