# Spatiotemporal smoke run: DCRNN on the cauair_st bundle (CPU, 1 epoch).
extends = ["../base.toml", "../datasets/cauair_ccaq_st.toml", "../models/DCRNN.toml"]

[experiment]
description = "Smoke: spatiotemporal / DCRNN"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
mode = "spatiotemporal"
seq_len = 24
label_len = 0
pred_len = 24
features = "M"

[training]
epochs = 1
batch_size = 8
loss = "mae"
patience = 1

[dataset]
name = "cauair_st"
root_path = "dataset/cauair_ccaq"
data_path = ""

[dataset.params]
input_dim = 3
npz_name = "his.npz"
scale = false
max_windows = 32

[model.params]
enc_in = 8
input_dim = 3
rnn_units = 16
num_rnn_layers = 1
max_diffusion_step = 2
