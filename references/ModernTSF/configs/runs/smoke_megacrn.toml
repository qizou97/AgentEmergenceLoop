# Spatiotemporal graph smoke run: MegaCRN on the CauAir/CCAQ node bundle
# (provides adj_mx + calendar covariates). CPU, 1 epoch.
extends = ["../base.toml", "../datasets/cauair_ccaq_st.toml", "../models/MegaCRN.toml"]

[experiment]
description = "Smoke: spatiotemporal graph / MegaCRN"

[experiment.runtime]
device = "cpu"
num_workers = 0

[task]
mode = "spatiotemporal"
seq_len = 24
label_len = 0
pred_len = 24
features = "M"

[training]
epochs = 1
batch_size = 8
loss = "mae"
patience = 1

[dataset]
name = "cauair_st"
root_path = "dataset/cauair_ccaq"
data_path = ""

[dataset.params]
input_dim = 3
npz_name = "his.npz"
scale = false
max_windows = 32

[model.params]
enc_in = 8
input_dim = 3
rnn_units = 16
num_layers = 1
cheb_k = 2
mem_num = 4
mem_dim = 8
use_curriculum_learning = true
